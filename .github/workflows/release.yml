name: 'Release'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kairos ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}

  create-latest-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          
          mkdir -p /tmp/release-assets
          cd /tmp/release-assets
          
          # Verify release exists
          if ! gh release view $VERSION --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Release $VERSION not found. Waiting a moment and retrying..."
            sleep 5
          fi
          
          # Download Windows .msi.zip and its signature
          gh release download $VERSION --repo ${{ github.repository }} --pattern "*.msi.zip*" || true
          
          echo "Downloaded files:"
          ls -lah

      - name: Create latest.json
        run: |
          VERSION="${{ github.ref_name }}"
          CLEAN_VERSION=${VERSION#v}
          
          # Extract signature from .sig file if it exists
          SIGNATURE=""
          if [ -f /tmp/release-assets/*.msi.zip.sig ]; then
            SIGNATURE=$(cat /tmp/release-assets/*.msi.zip.sig)
          else
            echo "Warning: Signature file not found, using empty string"
          fi
          
          # Get download URL
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$VERSION/Kairos_${CLEAN_VERSION}_x64_en-US.msi.zip"
          
          # Create latest.json
          cat > /tmp/latest.json <<EOF
          {
            "version": "$CLEAN_VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/$VERSION for release notes",
            "pub_date": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "$DOWNLOAD_URL"
              }
            }
          }
          EOF
          
          echo "Generated latest.json:"
          cat /tmp/latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          
          # Upload latest.json as release asset
          gh release upload $VERSION /tmp/latest.json \
            --repo ${{ github.repository }} \
            --clobber

      - name: Update latest.json in repo root
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Copy latest.json to repo root
          cp /tmp/latest.json latest.json
          
          # Commit and push
          git add latest.json
          git commit -m "chore: update latest.json for ${{ github.ref_name }}"
          git push
